<div class="home-page">

  <!-- Header -->
  <div class="home-header">
    <div class="home-logo">
      <span>U</span>
    </div>
    <div class="home-header-text">
      <h1>Unimed Tools</h1>
      <p>Ferramentas internas de correção e validação de arquivos</p>
    </div>
  </div>

  <div class="categories-grid">
    <div
      class="cat-card"
      *ngFor="let cat of categories"
      [class.cat-disabled]="!cat.ready"
      (click)="navigate(cat)">

      <div class="cat-card-top">
        <div class="cat-icon" [innerHTML]="cat.icon"></div>
        <div class="cat-badges">
          <span class="badge" [class]="cat.badgeClass">{{ cat.label }}</span>
          <span class="badge-coming" *ngIf="!cat.ready">Em breve</span>
        </div>
      </div>

      <div class="cat-card-body">
        <h3 class="cat-title">{{ cat.tag }}</h3>
        <p class="cat-desc">{{ cat.desc }}</p>
      </div>

      <div class="cat-card-footer">
        <span class="cat-accepts">{{ cat.accepts }}</span>
        <span class="cat-arrow" *ngIf="cat.ready">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>

    </div>
  </div>

  <div class="home-footer">
    <span>Unimed Lorena · Heitor Leite · 2026</span>
  </div>

</div>
