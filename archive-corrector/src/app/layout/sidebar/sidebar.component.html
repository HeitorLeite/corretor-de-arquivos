<aside class="sidebar" [class.collapsed]="!open">

  <!-- Brand + Toggle -->
  <div class="brand">
    <div class="brand-logo"><span>U</span></div>
    <div class="brand-text" *ngIf="open">
      <span class="brand-name">Unimed Tools</span>
      <span class="brand-sub">Correções e Validações</span>
    </div>
    <button class="toggle-btn" (click)="toggleSidebar.emit()" [title]="open ? 'Recolher' : 'Expandir'">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="2" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.3"/>
        <path *ngIf="open"  d="M7 5v8M4 9h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <path *ngIf="!open" d="M7 5v8M10 9H7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Home -->
  <div class="nav-section">
    <a class="nav-item home-item" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" [title]="'Início'">
      <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 6.5L8 2L14 6.5V13.5C14 13.78 13.78 14 13.5 14H10V10H6V14H2.5C2.22 14 2 13.78 2 13.5V6.5Z"
              stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="nav-label" *ngIf="open">Início</span>
    </a>
  </div>

  <!-- Divisor -->
  <div class="nav-divider">
    <span *ngIf="open">Ferramentas</span>
  </div>

  <!-- Itens -->
  <nav class="nav-list">
    <ng-container *ngFor="let item of items">
      <a class="nav-item"
         [class.nav-disabled]="!item.ready"
         [routerLink]="item.ready ? item.route : null"
         [routerLinkActive]="item.ready ? 'active' : ''"
         [title]="item.label + (item.ready ? '' : ' — Em breve')">
        <span class="nav-dot" [class]="item.badgeClass + '-dot'"></span>
        <span class="nav-item-text" *ngIf="open">
          <span class="nav-label">{{ item.label }}</span>
          <span class="nav-tag">{{ item.tag }}</span>
        </span>
        <span class="nav-coming" *ngIf="open && !item.ready">breve</span>
      </a>
    </ng-container>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer" *ngIf="open">
    <span>Heitor Leite · 2026</span>
  </div>

</aside>
