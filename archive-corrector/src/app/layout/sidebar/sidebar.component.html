<aside class="sidebar" [class.collapsed]="!open">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-logo">
      <span class="brand-icon">U</span>
    </div>
    <div class="brand-text" *ngIf="open">
      <span class="brand-name">Unimed Tools</span>
      <span class="brand-sub">Correções e Validações</span>
    </div>
    <button class="toggle-btn" (click)="toggleSidebar.emit()" [title]="open ? 'Recolher menu' : 'Expandir menu'">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path *ngIf="open" d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path *ngIf="!open" d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Home link -->
  <div class="nav-home">
    <a class="home-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
      <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 6.5L8 2L14 6.5V13.5C14 13.78 13.78 14 13.5 14H10V10H6V14H2.5C2.22 14 2 13.78 2 13.5V6.5Z"
              stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="nav-label" *ngIf="open">Início</span>
    </a>
  </div>

  <!-- Separator -->
  <div class="nav-sep" *ngIf="open">
    <span>Ferramentas</span>
  </div>
  <div class="nav-sep-line" *ngIf="!open"></div>

  <!-- Categories -->
  <nav class="nav-list">
    <div class="nav-category" *ngFor="let cat of categories" [class]="cat.colorClass">

      <!-- Category header -->
      <button class="cat-header" (click)="toggleCategory(cat)" [title]="cat.label">
        <div class="cat-dot"></div>
        <div class="cat-info" *ngIf="open">
          <span class="cat-label">{{ cat.label }}</span>
          <span class="cat-tag">{{ cat.tag }}</span>
        </div>
        <svg class="cat-chevron" *ngIf="open" width="12" height="12" viewBox="0 0 12 12" fill="none"
             [class.rotated]="!cat.expanded">
          <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Items -->
      <div class="cat-items" [class.hidden]="!cat.expanded">
        <a class="nav-item"
           *ngFor="let item of cat.items"
           [routerLink]="item.route"
           routerLinkActive="active"
           [title]="item.label">
          <span class="item-bullet">—</span>
          <span class="item-text" *ngIf="open">
            <span class="item-label">{{ item.label }}</span>
            <span class="item-desc">{{ item.desc }}</span>
          </span>
        </a>
      </div>

    </div>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer" *ngIf="open">
    <span>Heitor Leite · 2026</span>
  </div>

</aside>
