<div
  class="upload-zone"
  [class.drag-over]="dragOver"
  [class.has-file]="file"
  [class.disabled]="disabled"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
  (click)="onClick()"
>
  <input #fileInput type="file" [accept]="accept" (change)="onFileChange($event)" style="display:none">

  <ng-container *ngIf="!file">
    <div class="upload-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="upload-text">
      <span class="upload-label">{{ label }}</span>
      <span class="upload-sub">Arraste ou clique para selecionar</span>
    </div>
    <span class="upload-hint" *ngIf="hint">{{ hint }}</span>
  </ng-container>

  <ng-container *ngIf="file">
    <div class="file-check">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/>
        <path d="M5.5 9l2.5 2.5 4.5-4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="file-info">
      <span class="file-name">{{ file.name }}</span>
      <span class="file-size">{{ formatSize(file.size) }}</span>
    </div>
    <button class="clear-btn" (click)="clear($event)" title="Remover arquivo">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M10.5 3.5l-7 7M3.5 3.5l7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </ng-container>
</div>
